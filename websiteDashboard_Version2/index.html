<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AXIS GPS</title>
    <link rel="stylesheet" href="style.css"/>
    <script defer src="axis.js"></script>
</head>
<body>
<!-- animated gradient + cursor glow -->
<div class="bg"></div>
<div class="cursor-light"></div>

<!-- CENTERED PAGE -->
<div class="page">
    <main class="panel" id="panel">
        <!-- AXIS neon logo with stroke-draw intro -->
        <div class="logo-wrap">
            <svg class="axis-logo" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" aria-label="AXIS">
                <!-- four separate letters so we can stagger the draw -->
                <text x="130" y="145" class="axis-letter l1">A</text>
                <text x="360" y="145" class="axis-letter l2">X</text>
                <text x="505" y="145" class="axis-letter l3">I</text>
                <text x="710" y="145" class="axis-letter l4">S</text>
            </svg>
        </div>

        <p class="subtitle">
            Precision tracking. Intelligent navigation. Real-world performance.
        </p>

        <section class="widget">
            <h2>Live Tracking Map</h2>
            <p>Visualize your real-time GPS route with interactive mapping technology.</p>
            <button class="cta" onclick="openMap()">🌍 View Live Track</button>
        </section>
    </main>
</div>
</body>
</html>
